<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PCブラウザで使えるマンダラート 9×9 編集ページ" />
    <title>Mandala Board</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">マンダラートシート</p>
        <h1>好きなものを書いてみよう！</h1>
        <h2>使い方</h2>
        <ul>
          <li>各ブロックをクリックして直接入力できるよ。</li>
          <li>矢印キーで他のブロックへ移動できますぜ。</li>
        </ul>
        <div class="toolbar" aria-label="操作バー">
          <button id="resetButton" type="button">全消去</button>
          <button id="sampleGameButton" type="button">A. 好きなゲームを深掘り</button>
          <button id="sampleMoyamoyaButton" type="button">B. もやもや解決</button>
          <button id="sampleFavoriteButton" type="button">C. 自分の好きなもの</button>
          <button id="exportButton" type="button">セーブデータ（csv）を保存!!</button>
          <button id="importButton" type="button">セーブデータをロード！</button>
          <button id="saveImageButton" type="button">画像で保存</button>
          <input type="file" id="csvFileInput" accept=".csv" style="display: none;" />
          <span id="status" class="status" aria-live="polite">未保存の変更はありません</span>
        </div>
      </section>

      <section class="board-card" aria-label="マンダラート編集エリア">
        <div id="board" class="board" role="grid" aria-label="マンダラート 9×9 グリッド"></div>
      </section>

      <aside class="notes-card">
        <h2>使い方</h2>
        <ul>
          <li>各ブロックをクリックして直接入力できるよ。</li>
          <li>矢印キーで他のブロックへ移動できますぜ。</li>
        </ul>
      </aside>
    </main>

    <script src="main.js"></script>
  </body>
</html>
