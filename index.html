<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PCブラウザで使えるマンダラート 9×9 編集ページ" />
    <title>Mandala Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">マンダラートシート</p>
        <h1>好きなものを書いてみよう！</h1>
        <p class="lede">
          それぞれのブロックは直接編集できるよ！
        </p>
        <div class="toolbar" aria-label="操作バー">
          <button id="resetButton" type="button">全消去</button>
          <button id="sampleButton" type="button">サンプルを挿入</button>
          <span id="status" class="status" aria-live="polite">未保存の変更はありません</span>
        </div>
      </section>

      <section class="board-card" aria-label="マンダラート編集エリア">
        <div id="board" class="board" role="grid" aria-label="マンダラート 9×9 グリッド"></div>
      </section>

      <aside class="notes-card">
        <h2>使い方</h2>
        <ul>
          <li>各セルをクリックして直接入力します。</li>
          <li>Enter と矢印キーで次のセルへ移動できます。</li>
          <li>内容は自動保存され、次回読み込み時に復元されます。</li>
        </ul>
      </aside>
    </main>

    <script src="main.js"></script>
  </body>
</html>
